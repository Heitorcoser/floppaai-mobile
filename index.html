<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FloppaAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px}
.ico{font-size:3rem;animation:pulse 1.5s infinite}
p{font-size:.85rem;color:#888}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="ico">🐱</div>
<p>Detectando dispositivo...</p>
<script>
// Detecta se é mobile ou PC e redireciona para a versão certa
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);

if (isMobile) {
  window.location.replace("./mobile/");
} else {
  window.location.replace("./desktop/");
}
</script>
</body>
</html>
